services:
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    profiles:
      - all
      - ollama
      - openwebui
      - anythingllm
    ports:
      - "11434:11434"
    x-plaiground-ui: []
    # https://docs.ollama.com/faq
    environment:
      - OLLAMA_NEW_ENGINE=${OLLAMA_NEW_ENGINE:-false}
    volumes:
      - ./data/ollama:/root/.ollama

  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    profiles:
      - all
      - openwebui
    ports:
      - "6333:6333"
    x-plaiground-ui:
      - path: /dashboard
    # https://qdrant.tech/documentation/ops-configuration/configuration/
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    volumes:
      - ./data/qdrant:/qdrant/storage

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    profiles:
      - all
      - openwebui
    ports:
      - "6379:6379"
    x-plaiground-ui: []
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-some_random_secret_key}

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    profiles:
      - all
      - openwebui
    configs:
      - source: searxng_config
        target: /etc/searxng/settings.yml
    ports:
      - "9081:8080"
    # https://github.com/searxng/searxng/blob/master/searx/settings.yml
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-some_random_secret_key}
      - SEARXNG_VALKEY_URL=valkey://valkey:6379
    depends_on:
      - valkey

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    profiles:
      - all
      - openwebui
    ports:
      - "9080:8080"
    volumes:
      - ./data/open-webui:/app/backend/data
    # https://docs.openwebui.com/reference/env-configuration/
    environment:
      - ENABLE_OPENAI_API=${ENABLE_OPENAI_API:-false}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENABLE_OLLAMA_API=${ENABLE_OLLAMA_API:-true}
      - OLLAMA_API_BASE_URL=http://ollama:11434
      - COMFYUI_BASE_URL=http://comfyui:8188
      - AUTOMATIC1111_BASE_URL=http://automatic1111:7860
      - ENABLE_IMAGE_GENERATION=true
      - IMAGE_GENERATION_ENGINE=comfyui
      - IMAGE_GENERATION_MODEL=v1-5-pruned-emaonly-fp16.safetensors
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search
      - CONTENT_EXTRACTION_ENGINE=tika
      - TIKA_SERVER_URL=http://tika:9998
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-default_empty_key}
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - ollama
      - qdrant
      - searxng
      - tika
  
  anythingllm:
    image: mintplexlabs/anythingllm
    restart: unless-stopped
    profiles:
      - all
      - anythingllm
    ports:
      - "3001:3001"
    # https://github.com/Mintplex-Labs/anything-llm/blob/master/docker/.env.example
    environment:
      - STORAGE_DIR=/app/server/storage
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_PATH=http://ollama:11434
      - OLLAMA_MODEL_PREF=llama3.1:8b
      - EMBEDDING_ENGINE=ollama
      - EMBEDDING_BASE_PATH=http://ollama:11434
      - EMBEDDING_MODEL_PREF=nomic-embed-text:latest
      - EMBEDDING_MODEL_MAX_CHUNK_LENGTH=8192
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
    volumes:
      - ./data/anythingllm/storage:/app/server/storage
      - ./data/anythingllm/collector/hotdir:/app/collector/hotdir
      - ./data/anythingllm/collector/output:/app/collector/output
    depends_on:
      - ollama

  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
      target: comfyui
    profiles:
      - all
      - comfyui
    ports:
      - "8188:8188"
    volumes:
      - ./data/comfyui:/data
      - ./data/huggingface:/huggingface
      - ./data/torch.hub:/torch.hub

  automatic1111:
    build:
      context: .
      dockerfile: Dockerfile
      target: automatic1111
    profiles:
      - all
      - automatic1111
    ports:
      - "7860:7860"
    volumes:
      - ./data/automatic1111:/data
      - ./data/huggingface:/huggingface
      - ./data/torch.hub:/torch.hub

  tika:
    image: apache/tika:latest-full
    ports:
      - "9998:9998"
    restart: unless-stopped
    profiles:
      - all
      - tika
      - openwebui
    environment:
      - JAVA_OPTS=-Xmx2g
    configs:
      - source: tika_config
        target: /tika-config.xml
    command: [
      "tika-server",
      "--config=/tika-config.xml",
      "--port=9998"
    ]

  jupyter:
    image: quay.io/jupyter/pytorch-notebook:x86_64-cuda12-latest
    ports:
      - "8888:8888"
    profiles:
      - all
      - jupyter
    environment:
      - GRANT_SUDO=yes
      - HF_HOME=/huggingface
      - TORCH_HOME=/torch.hub
    command: start-notebook.py --IdentityProvider.token='' --notebook-dir=/notebooks
    volumes:
      - ./data/jupyter:/notebooks
      - ./data/huggingface:/huggingface
      - ./data/torch.hub:/torch.hub

  stack-overview:
    build: stack-overview
    profiles:
      - all
      - stack-overview
    ports:
      - "4444:8500"
    environment:
      - SERVER_NAME=${PLAIGROUND_HOST:-localhost}
    volumes:
      - ./docker-compose.yml:/app/docker-compose.yml:ro

  model-downloader:
    build: model-downloader
    profiles:
      - all
      - comfyui
      - automatic1111
    ports:
      - "4445:8080"
    volumes:
      - ./data/huggingface:/huggingface

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    profiles:
      - all
      - n8n
    ports:
      - "5678:5678"
    # if you want to use the default-user you have to create the directory for the bind-mount manually for uid=1000
    user: root
    # https://docs.n8n.io/hosting/configuration/user-management-self-hosted/
    # https://docs.n8n.io/hosting/configuration/environment-variables/
    environment:
      - N8N_HOST=${PLAIGROUND_HOST:-localhost}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}

      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      - N8N_INSTANCE_OWNER_MANAGED_BY_ENV=${N8N_INSTANCE_OWNER_MANAGED_BY_ENV:-true}
      - N8N_INSTANCE_OWNER_EMAIL=${N8N_INSTANCE_OWNER_EMAIL}
      - N8N_INSTANCE_OWNER_FIRST_NAME=${N8N_INSTANCE_OWNER_FIRST_NAME}
      - N8N_INSTANCE_OWNER_LAST_NAME=${N8N_INSTANCE_OWNER_LAST_NAME}
      - N8N_INSTANCE_OWNER_PASSWORD_HASH=${N8N_INSTANCE_OWNER_PASSWORD_HASH}
      - N8N_DIAGNOSTICS_ENABLED=${N8N_DIAGNOSTICS_ENABLED:-false}
    volumes:
      - ./data/n8n:/home/node/.n8n

configs:
  tika_config:
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <properties>
        <parsers>
          <parser class="org.apache.tika.parser.DefaultParser"/>
        </parsers>
        <ocr>
          <tesseractPath>/usr/bin/tesseract</tesseractPath>
          <language>deu+eng</language>
          <enableImageProcessing>true</enableImageProcessing>
          <ocrStrategy>auto</ocrStrategy>
        </ocr>
      </properties>
  searxng_config:
    content: |
      use_default_settings: true
      search:
        formats: ["html", "json"]
